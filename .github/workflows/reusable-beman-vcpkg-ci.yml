# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception

name: 'Beman vcpkg CI'
on:
  workflow_call:
    inputs:
      port_name:
        description: 'vcpkg port name (e.g. beman-transform-view)'
        type: string
        required: true
      container_image:
        description: 'Container image to use for CI jobs'
        type: string
        default: 'ghcr.io/bemanproject/infra-containers-gcc:latest'
      feature_combinations:
        description: |
          JSON array of vcpkg feature combinations to test in the port-install
          matrix. Each entry has the shape:
            {"features": {"<feature-name>": true | false, ...}}
          true features are enabled in the install set. false features are
          explicitly excluded; whenever any feature is false, default-features
          are suppressed in the test manifest so the assertion is meaningful
          even for features that ship in the port's default-features list.
          The default value runs a single combination with the port's
          default features only.
        type: string
        default: '[{"features":{}}]'

jobs:
  compute-port-install-matrix:
    runs-on: ubuntu-latest
    outputs:
      entries: ${{ steps.gen.outputs.entries }}
    steps:
      - id: gen
        env:
          INPUT: ${{ inputs.feature_combinations }}
        run: |
          echo "entries=$(jq -c 'map({label: (.features|tostring), combo: .})' <<<"$INPUT")" >> "$GITHUB_OUTPUT"

  vcpkg-port-install:
    name: Test port templates ${{ matrix.entry.label }}
    needs: compute-port-install-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.compute-port-install-matrix.outputs.entries) }}
    container:
      image: ${{ inputs.container_image }}
    env:
      VCPKG_ROOT: /usr/local/share/vcpkg
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Validate port templates exist
        run: |
          if [ ! -f port/vcpkg.json.in ] || [ ! -f port/portfile.cmake.in ]; then
            echo "::error::Missing port/vcpkg.json.in or port/portfile.cmake.in"
            exit 1
          fi

      - name: Build overlay port from templates
        run: |
          PORT_NAME="${{ inputs.port_name }}"
          OVERLAY_DIR="${RUNNER_TEMP}/overlay-ports/${PORT_NAME}"
          mkdir -p "${OVERLAY_DIR}"

          # Render vcpkg.json.in with a dummy version
          sed -e 's/@VERSION@/0.0.0/g' port/vcpkg.json.in > "${OVERLAY_DIR}/vcpkg.json"

          # Generate a portfile that replaces vcpkg_from_github with a local source path.
          # Use awk to skip the vcpkg_from_github(...) block and prepend a set(SOURCE_PATH ...).
          awk '
            /vcpkg_from_github\(/ { skip=1 }
            skip && /\)/ { skip=0; next }
            skip { next }
            { print }
          ' port/portfile.cmake.in \
            | sed 's/@VERSION@/0.0.0/g; s/@SHA512@/0/g' > "${RUNNER_TEMP}/portfile_body.cmake"

          printf 'set(SOURCE_PATH "%s")\n' "${GITHUB_WORKSPACE}" > "${OVERLAY_DIR}/portfile.cmake"
          cat "${RUNNER_TEMP}/portfile_body.cmake" >> "${OVERLAY_DIR}/portfile.cmake"

          # Copy any additional port files (patches, usage, etc.)
          for f in port/*; do
            basename="$(basename "$f")"
            case "${basename}" in
              *.in) ;;
              *) cp "$f" "${OVERLAY_DIR}/" ;;
            esac
          done

          echo "::group::Overlay vcpkg.json"
          cat "${OVERLAY_DIR}/vcpkg.json"
          echo "::endgroup::"
          echo "::group::Overlay portfile.cmake"
          cat "${OVERLAY_DIR}/portfile.cmake"
          echo "::endgroup::"

      - name: Install port via manifest with overlay
        working-directory: ${{ runner.temp }}
        env:
          PORT_NAME: ${{ inputs.port_name }}
          COMBO_JSON: ${{ toJSON(matrix.entry.combo) }}
        run: |
          OVERLAY_DIR="${RUNNER_TEMP}/overlay-ports/${PORT_NAME}"

          # Build the dependency entry from the combo's true/false feature toggles.
          ON_FEATURES=$(jq -c '[(.features // {}) | to_entries[] | select(.value == true) | .key]' <<< "$COMBO_JSON")
          OFF_COUNT=$(jq '[(.features // {}) | to_entries[] | select(.value == false)] | length' <<< "$COMBO_JSON")

          if [ "$OFF_COUNT" -gt 0 ]; then
            DEP=$(jq -n --arg name "$PORT_NAME" --argjson feats "$ON_FEATURES" \
              '{name: $name, "default-features": false, features: $feats}')
          elif [ "$ON_FEATURES" != "[]" ]; then
            DEP=$(jq -n --arg name "$PORT_NAME" --argjson feats "$ON_FEATURES" \
              '{name: $name, features: $feats}')
          else
            DEP=$(jq -n --arg name "$PORT_NAME" '$name')
          fi

          mkdir -p port-test && cd port-test
          jq -n --argjson dep "$DEP" \
            '{name: "port-test", version: "0.0.0", dependencies: [$dep]}' > vcpkg.json

          echo "::group::Test manifest"
          cat vcpkg.json
          echo "::endgroup::"

          # Copy vcpkg-configuration.json so vcpkg can resolve registry dependencies
          if [ -f "${GITHUB_WORKSPACE}/vcpkg-configuration.json" ]; then
            cp "${GITHUB_WORKSPACE}/vcpkg-configuration.json" .
          fi

          "$VCPKG_ROOT/vcpkg" install \
            --overlay-ports="${OVERLAY_DIR}"

  vcpkg-developer-build:
    name: Test developer build with vcpkg
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}
    env:
      VCPKG_ROOT: /usr/local/share/vcpkg
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Validate vcpkg manifest exists
        run: |
          if [ ! -f vcpkg.json ] || [ ! -f vcpkg-configuration.json ]; then
            echo "::error::Missing vcpkg.json or vcpkg-configuration.json"
            exit 1
          fi

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Configure with vcpkg
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
